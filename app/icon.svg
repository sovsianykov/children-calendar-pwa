<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Calendar body -->
  <rect x="12" y="28" width="104" height="88" rx="14" fill="#4A90D9"/>
  <!-- Calendar top bar -->
  <rect x="12" y="28" width="104" height="28" rx="14" fill="#E91E8C"/>
  <rect x="12" y="42" width="104" height="14" fill="#E91E8C"/>
  <!-- Rings -->
  <rect x="36" y="18" width="10" height="24" rx="5" fill="#2D2D2D"/>
  <rect x="82" y="18" width="10" height="24" rx="5" fill="#2D2D2D"/>
  <!-- Date number -->
  <text x="64" y="98" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5</text>
  <!-- Star decoration -->
  <text x="96" y="80" font-size="20">⭐</text>
</svg>
